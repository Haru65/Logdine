<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ff6b00" />
    <title>RestroHub Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fffaf5;
        color: #201815;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(420px, 100%);
        border: 1px solid #f0ded3;
        border-radius: 12px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 14px 40px rgb(41 28 20 / 12%);
      }
      img {
        width: 56px;
        height: 56px;
        border-radius: 12px;
      }
      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #6f625b;
        line-height: 1.5;
      }
      button {
        margin-top: 20px;
        border: 0;
        border-radius: 10px;
        background: #ff6b00;
        color: white;
        padding: 11px 16px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" />
      <h1>RestroHub is offline</h1>
      <p>Your saved app shell is available, but this page needs a network connection to refresh live restaurant data.</p>
      <button type="button" onclick="window.location.reload()">Retry</button>
    </main>
  </body>
</html>
